<div class="auth-wrapper">

  <div class="auth-card">

    <h1 class="brand">
      🌱 EcoTrackAI
    </h1>

    <p class="subtitle">
      Login to continue
    </p>

    <!-- Email / Mobile -->

    <input
      [(ngModel)]="loginId"
      (keyup.enter)="login()"
      placeholder="Email or Mobile Number"
      class="auth-input">

    <div
      *ngIf="emailError"
      class="field-error">

      {{ emailError }}

    </div>

    <!-- Password -->

    <input
      [(ngModel)]="password"
      (keyup.enter)="login()"
      type="password"
      placeholder="Password"
      class="auth-input">

    <div
      *ngIf="passwordError"
      class="field-error">

      {{ passwordError }}

    </div>

    <!-- Login Button -->

    <button
      (click)="login()"
      class="btn-primary"
      [disabled]="isLoading">

      {{
        isLoading
          ? 'Signing In...'
          : 'Login'
      }}

    </button>

    <!-- API Error -->

    <div
      *ngIf="errorMessage"
      class="error-message">

      {{ errorMessage }}

    </div>

    <!-- Footer -->

    <div class="auth-footer">

      <div class="forgot-link">

        <a routerLink="/forgot-password">
          Forgot Password?
        </a>

      </div>

      <div class="register-link">

        Don't have an account?

        <a routerLink="/register">
          Register Here
        </a>

      </div>

    </div>

  </div>

</div>
