<div
  style="
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#f5f5f5;">

  <div
    style="
    width:420px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 2px 15px rgba(0,0,0,0.1);">

    <h1
      style="
      text-align:center;
      color:#2e7d32;
      margin-bottom:10px;">

      🌱 EcoTrackAI

    </h1>

    <p
      style="
      text-align:center;
      color:gray;
      margin-bottom:25px;">

      Login to continue

    </p>

    <input
      [(ngModel)]="loginId"
      placeholder="Email or Mobile Number"
      style="
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;">

    <br><br>

    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
      style="
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;">

    <br><br>

    <button
      (click)="login()"
      style="
      width:100%;
      padding:12px;
      background:#2e7d32;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;">

      Login

    </button>

    <br><br>

    <div style="text-align:right;">

      <a
        href="/forgot-password"
        style="
        text-decoration:none;
        color:#1976d2;">

        Forgot Password?

      </a>

    </div>

    <br>

    <div
      style="
      text-align:center;
      color:#666;">

      Don't have an account?

      <a
        href="/register"
        style="
        color:#2e7d32;
        text-decoration:none;
        font-weight:bold;">

        Register Here

      </a>

    </div>

  </div>

</div>
