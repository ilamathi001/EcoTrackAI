<div class="profile-container">

  <div class="profile-card">

    <div class="avatar">
      {{ user.name.charAt(0).toUpperCase() }}
    </div>

    <h1>
      {{ user.name }}
    </h1>

    <p class="subtitle">
      EcoTrackAI Member 🌱
    </p>

    <div class="info-card">

      <h3>📧 Email</h3>

      <p>
        {{ user.email }}
      </p>

    </div>

    <div class="info-card">

      <h3>📱 Mobile Number</h3>

      <p>
        {{ user.mobileNumber }}
      </p>

    </div>

    <div class="stats-section">

      <div class="stat-box">

        <h4>🌱 Status</h4>

        <p>Active User</p>

      </div>

      <div class="stat-box">

        <h4>🏆 Level</h4>

        <p>Green Member</p>

      </div>

    </div>

    <div class="button-group">

      <button
        class="dashboard-btn"
        (click)="goToDashboard()">

        Dashboard

      </button>

      <button
        class="logout-btn"
        (click)="logout()">

        Logout

      </button>

    </div>

  </div>

</div>
