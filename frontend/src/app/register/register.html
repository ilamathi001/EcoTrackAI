<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="brand">🌱 EcoTrackAI</h1>
    <h2 class="form-title">Create Account</h2>

    <div class="form-group">
      <input [(ngModel)]="name" placeholder="Full Name" class="auth-input">
      <input [(ngModel)]="email" placeholder="Email" class="auth-input">
      <input [(ngModel)]="mobileNumber" placeholder="Mobile Number" class="auth-input">
      <input [(ngModel)]="password" type="password" placeholder="Password" class="auth-input">
    </div>

    <button (click)="register()" class="btn-primary">Create Account</button>

    <div class="auth-footer">
      <a href="/login">Already Registered? Login</a>
    </div>
  </div>
</div>
