<div class="auth-wrapper">

  <div class="auth-card">

    <h1 class="brand">
      🌱 EcoTrackAI
    </h1>

    <p class="subtitle">
      Create Your Account
    </p>

    <input
      [(ngModel)]="name"
      placeholder="Full Name"
      class="auth-input">

    <input
      [(ngModel)]="email"
      placeholder="Email Address"
      class="auth-input">

    <input
      [(ngModel)]="mobileNumber"
      placeholder="Mobile Number"
      class="auth-input">

    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
      class="auth-input">

    <button
      (click)="register()"
      class="btn-primary">

      Create Account

    </button>

    <div class="auth-footer">

      <a routerLink="/login">
        Already Registered? Login
      </a>

    </div>

  </div>

</div>
